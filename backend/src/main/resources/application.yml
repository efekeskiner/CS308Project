spring:
  datasource:
      url: jdbc:mysql://127.0.0.1:3307/bookstore_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          username: root
              password: "1234"
                  driver-class-name: com.mysql.cj.jdbc.Driver
                    jpa:
                        hibernate:
                              ddl-auto: update
                                  show-sql: true
                                      properties:
                                            hibernate:
                                                    dialect: org.hibernate.dialect.MySQL8Dialect

                                                    server:
                                                      port: 8080

                                                      app:
                                                        jwt:
                                                            secret: "bookstore-super-secret-key-minimum-256-bit-long-for-hs256-algorithm"
                                                                expiration-ms: 86400000
                                                                    refresh-expiration-ms: 604800000
